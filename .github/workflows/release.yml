name: release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      # `releases_created` is path-agnostic; the tag/version outputs are prefixed with the
      # package path, since release-please only emits bare names for a root (`.`) component.
      released: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs['packages/tui--tag_name'] }}
      version: ${{ steps.release.outputs['packages/tui--version'] }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      # A misnamed output resolves to the empty string, which reads as "no release" and silently
      # skips publish on a green run. Fail loudly instead if the prefix ever drifts again.
      - name: assert release outputs
        if: steps.release.outputs.releases_created == 'true'
        env:
          TAG: ${{ steps.release.outputs['packages/tui--tag_name'] }}
          VERSION: ${{ steps.release.outputs['packages/tui--version'] }}
        run: |
          if [ -z "$TAG" ] || [ -z "$VERSION" ]; then
            echo "::error::release created but tag/version outputs are empty; the packages/tui-- output prefix has drifted"
            exit 1
          fi

  publish:
    needs: release-please
    if: needs.release-please.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      # Build the tagged tree, so the assets can never come from a later commit.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run check
      - name: build all targets
        run: bun packages/tui/script/build.ts --archive
      - name: upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} dist/*.tar.gz dist/SHA256SUMS --clobber
      # npm >= 11.5 (node 24) is required for OIDC trusted publishing
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in dist/stet-*/ dist/stet/; do
            (
              cd "$dir"
              name=$(jq -r .name package.json)
              version=$(jq -r .version package.json)
              if npm view "$name@$version" version >/dev/null 2>&1; then
                echo "skipping $name@$version (already published)"
              else
                npm publish --access public
              fi
            )
          done

  homebrew:
    needs: [release-please, publish]
    if: needs.release-please.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false
      - name: render formula
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          mkdir -p assets
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            gh release download "$TAG" --pattern "stet-$target.tar.gz" --dir assets
          done
          render() { shasum -a 256 "assets/stet-$1.tar.gz" | cut -d' ' -f1; }
          sed -e "s/{{VERSION}}/$VERSION/g" \
              -e "s/{{SHA_DARWIN_ARM64}}/$(render darwin-arm64)/" \
              -e "s/{{SHA_DARWIN_X64}}/$(render darwin-x64)/" \
              -e "s/{{SHA_LINUX_X64}}/$(render linux-x64)/" \
              -e "s/{{SHA_LINUX_ARM64}}/$(render linux-arm64)/" \
              packages/tui/script/stet.rb.tmpl > stet.rb
      - name: push to tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/jimmy-guzman/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp stet.rb tap/Formula/stet.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/stet.rb
          if git diff --staged --quiet; then
            echo "formula unchanged; skipping commit"
          else
            git commit -m "stet ${VERSION}"
            git pull --rebase origin HEAD
            git push
          fi
