name: release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run check
      - name: build all targets
        run: bun script/build.ts --archive
      - name: upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} dist/*.tar.gz dist/SHA256SUMS --clobber
      # npm >= 11.5 (node 24) is required for OIDC trusted publishing
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in dist/sideye-*/ dist/sideye/; do
            (
              cd "$dir"
              name=$(jq -r .name package.json)
              version=$(jq -r .version package.json)
              if npm view "$name@$version" version >/dev/null 2>&1; then
                echo "skipping $name@$version (already published)"
              else
                npm publish
              fi
            )
          done

  homebrew:
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: render formula
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          mkdir -p assets
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            gh release download "$TAG" --pattern "sideye-$target.tar.gz" --dir assets
          done
          render() { shasum -a 256 "assets/sideye-$1.tar.gz" | cut -d' ' -f1; }
          sed -e "s/{{VERSION}}/$VERSION/g" \
              -e "s/{{SHA_DARWIN_ARM64}}/$(render darwin-arm64)/" \
              -e "s/{{SHA_DARWIN_X64}}/$(render darwin-x64)/" \
              -e "s/{{SHA_LINUX_X64}}/$(render linux-x64)/" \
              -e "s/{{SHA_LINUX_ARM64}}/$(render linux-arm64)/" \
              script/sideye.rb.tmpl > sideye.rb
      - name: push to tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/jimmy-guzman/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp sideye.rb tap/Formula/sideye.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sideye.rb
          if git diff --staged --quiet; then
            echo "formula unchanged; skipping commit"
          else
            git commit -m "sideye ${VERSION}"
            git pull --rebase origin HEAD
            git push
          fi
